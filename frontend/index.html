<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Butler — Home Floorplan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Butler — Home</h1>
    <p class="subtitle">2×3 floorplan • Click a room to toggle its light</p>
    <!-- Prompt to send to both LLMs -->
    <div style="margin-top:10px;">
      <input id="prompt-input" type="text" placeholder="Type a command (e.g. 'It's a bit dim in the office')" style="width:60%;padding:8px;border-radius:8px;border:1px solid #294160;background:transparent;color:inherit;"> 
      <button id="prompt-send" class="tbtn">Send to both</button>
    </div>
    <!-- Voice recorder -->
    <div style="margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;">
      <button id="rec-start" class="tbtn">Record</button>
      <button id="rec-stop" class="tbtn" disabled>Stop</button>
    </div>
    <div id="stt-transcript" style="margin-top:8px;color:var(--muted);font-size:13px;min-height:20px;text-align:center;"></div>

    <!-- Thermostat bar removed (not used) -->

    <!-- Lights toolbar -->
    <div class="toolbar">
      <span class="tb-label">Lights:</span>
      <button class="tbtn" data-scope="all"        data-device="light" data-action="turn_on">All On</button>
      <button class="tbtn" data-scope="all"        data-device="light" data-action="turn_off">All Off</button>
      <span class="sep"></span>
      <button class="tbtn" data-scope="upstairs"   data-device="light" data-action="turn_on">Upstairs On</button>
      <button class="tbtn" data-scope="upstairs"   data-device="light" data-action="turn_off">Upstairs Off</button>
      <span class="sep"></span>
      <button class="tbtn" data-scope="downstairs" data-device="light" data-action="turn_on">Downstairs On</button>
      <button class="tbtn" data-scope="downstairs" data-device="light" data-action="turn_off">Downstairs Off</button>
    </div>
  </header>

  <!-- Two floorplans: local vs cloud -->
  <main style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:8px;">
    <section style="flex:1;min-width:320px;max-width:540px;">
      <h2 style="margin:6px 0 8px 0;text-align:center">Local Model</h2>
      <div style="text-align:center;margin-bottom:6px;">
        <span id="thermo-mode-local" class="thermo-chip">—</span>
        <span id="thermo-target-local" class="thermo-chip">--°C</span>
      </div>
      <div id="floorplan-local" class="floorplan"></div>
    </section>
    <section style="flex:1;min-width:320px;max-width:540px;">
      <h2 style="margin:6px 0 8px 0;text-align:center">Cloud Model</h2>
      <div style="text-align:center;margin-bottom:6px;">
        <span id="thermo-mode-cloud" class="thermo-chip">—</span>
        <span id="thermo-target-cloud" class="thermo-chip">--°C</span>
      </div>
      <div id="floorplan-cloud" class="floorplan"></div>
    </section>
  </main>

  <footer>Updates on change • Pure HTML/CSS/JS</footer>

  <script src="app.js"></script>
</body>
</html>
